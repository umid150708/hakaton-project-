<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/bozorboy.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bozorboy — O'zbekiston an'anaviy bozor platformasi</title>
    <meta name="description" content="Bozorboy — Chorsu, Ipodrom va butun O'zbekiston ulgurji bozorini birlashtiruvchi raqamli platforma. Xaridor va sotuvchi bevosita, AI yordamida." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      // Apply saved theme before first paint to avoid a flash of the wrong mode.
      (function () {
        try {
          var saved = localStorage.getItem('bb-theme');
          var sys = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          var theme = saved || sys || 'dark';
          document.documentElement.classList.add(theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
